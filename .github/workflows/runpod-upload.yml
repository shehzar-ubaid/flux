- name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          # Yahan apna asli Docker Hub username likh dein (e.g., shehzar123)
          username: YOUR_ACTUAL_DOCKERHUB_USERNAME 
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Yahan bhi apna username likhein
          tags: YOUR_ACTUAL_DOCKERHUB_USERNAME/flux-runpod:latest