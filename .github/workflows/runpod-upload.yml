name: Build and Push to Docker Hub

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          # Yahan apna ASLI Docker Hub Username likhein (e.g., shehzarubaid)
          username: YOUR_DOCKERHUB_USERNAME_HERE
          # Ye GitHub Secrets se hi aayega
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push to Docker Hub
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Yahan bhi 'YOUR_DOCKERHUB_USERNAME_HERE' ki jagah apna username likhein
          tags: YOUR_DOCKERHUB_USERNAME_HERE/flux-runpod:latest