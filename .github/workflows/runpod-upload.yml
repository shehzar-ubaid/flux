name: Build and Push to Docker Hub

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          # Yahan apna asli Docker Hub Username likhein
          username: APNA_USERNAME_YAHAN_LIKHEIN
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push to Docker Hub
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Yahan bhi 'APNA_USERNAME_YAHAN_LIKHEIN' ki jagah apna username likhein
          tags: APNA_USERNAME_YAHAN_LIKHEIN/flux-runpod:latest